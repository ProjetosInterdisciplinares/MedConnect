<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LoginCNPJ{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); width: 100%; max-width: 420px; }
    h2 { margin-bottom: 1.5rem; color: #333; }
    label { display: block; margin-bottom: .3rem; font-weight: bold; font-size: .9rem; }
    input { width: 100%; padding: .6rem; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1rem; font-size: 1rem; }
    button { width: 100%; padding: .75rem; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1558b0; }
    .errors { color: #c0392b; font-size: .85rem; margin-bottom: 1rem; }
    .link { text-align: center; margin-top: 1rem; font-size: .9rem; }
    .link a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
